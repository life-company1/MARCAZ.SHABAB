<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="kh.css">
     <link rel="icon" type="image/png" href="kh1 .jpeg" sizes="32x32" />
     <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title> sign in </title>
</head>
<body>
    
<style>
      /* --- 1. إعدادات عامة وتصفير الهوامش --- */
      html, body {
          height: 100%;
      }

      * {
          box-sizing: border-box;
          margin: 0;
          padding: 0;
          font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      body {
          direction: rtl;
          background: linear-gradient(135deg, #144574bb, #166b67, #2b6c77, #3e595a);
          color: bisque;
          min-height: 100vh;
          overflow-x: hidden;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          padding: 20px;
      }

      /* --- 2. تنسيق حاوية الفورم --- */
      .form-container {
          width: 100%;
          max-width: 450px;
          margin: 60px auto 40px auto; /* مسافة متناسقة من الأعلى */
          padding: 30px;
          background-color: rgba(0, 0, 0, 0.4); /* خلفية شفافة كما طلبت */
          border-radius: 12px;
          box-shadow: 0 4px 15px rgb(17, 228, 182);
      }

      /* عنوان الفورم */
      .form-container h2 {
          text-align: center;
          color: bisque; /* تعديل اللون ليتماشى مع لون النص العام ويكون واضحاً */
          margin-bottom: 25px;
          font-size: 24px;
      }

      /* تقسيم الحقول */
      .form-group {
          margin-bottom: 20px;
          display: flex;
          flex-direction: column;
      }

      /* تنسيق الـ Labels */
      .form-group label {
          font-size: 14px;
          font-weight: 600;
          color: bisque;
          margin-bottom: 8px;
      }

      /* تنسيق Inputs */
      .form-group input {
          padding: 12px 15px;
          font-size: 15px;
          border: 1px solid #cccccc;
          border-radius: 8px;
          outline: none;
          transition: all 0.3s ease;
          background-color: #f9f9f9;
          color: #333;
      }

      /* تأثير الـ Focus */
      .form-group input:focus {
          border-color: #007bff;
          background-color: #ffffff;
          box-shadow: 0 0 5px rgba(6, 167, 153, 0.671);
      }

      .form-group input[type="date"] {
          font-family: inherit;
          cursor: pointer;
      }

      /* --- 3. أزرار التحكم --- */
      /* زر حفظ البيانات */
      .submit-btn {
          width: 100%;
          padding: 12px;
          font-size: 16px;
          font-weight: bold;
          color: #ffffff;
          background-color: #00ffaa86;
          border: none;
          border-radius: 8px;
          cursor: pointer;
          transition: background-color 0.3s ease;
          margin-top: 10px;
        }

      .submit-btn:hover {
          background-color: #000000;
          color: #00ffaa;
      }

      /* زر Let's Go السفلي المتجاوب */
      .bb {
          width: 100%;
          max-width: 400px;
          height: 45px;
          border-radius: 15px;
          box-shadow: 0 10px 20px #07bea098;
          background-color: #1cb98a;
          color: #e9e9e9;
          font-size: 16px;
          font-weight: bold;
          border: none;
          cursor: pointer;
          margin: 20px auto; /* توسط تلقائي ومسافة أمان من الأسفل */
          transition: all 0.3s ease;
      }

      .bb:disabled {
          background-color: #555555;
          box-shadow: none;
          color: #aaaaaa;
          cursor: not-allowed;
          opacity: 0.6;
      }

      .bb:not(:disabled):hover {
          background-color: #138562;
          transform: translateY(-2px);
      }

      /* --- 5. شاشات الميديا (Responsive) --- */
      @media (max-width: 500px) {
          .form-container {
              width: 95%;
              padding: 20px;
              margin-top: 30px;
          }
          .bb {
              width: 90%;
              height: 42px;
          }
      }
    </style>

<div class="form-container">
  <form id="userDataForm">
    <h2>إنشاء حساب جديد</h2>
    
    <div class="form-group">
      <label for="username">اسم المستخدم (Username):</label>
      <input type="text" id="username" placeholder="أدخل اسمك بالكامل" required>
    </div>

    <div class="form-group">
      <label for="address">العنوان:</label>
      <input type="text" id="address" name="address" placeholder="المدينة، الشارع، المبنى" required>
    </div>

    <div class="form-group">
      <label for="birthdate">تاريخ الميلاد:</label>
      <input type="date" id="birthdate" name="birthdate" required>
    </div>

    <div class="form-group">
      <label for="email">البريد الإلكتروني:</label>
      <input type="email" id="email" name="email" placeholder="name@domain.com" required>
    </div>

    <button type="submit" class="submit-btn">حفظ البيانات وثبت الحساب 💾</button>
  </form>
</div>

<button id="mm" class="bb" disabled> Let's Go 🚀 </button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// ⚙️ إعدادات الفايربيز الموحدة لمشروعك Marcaz Shabab
const firebaseConfig = {
    apiKey: "AIzaSyBpDxW-UlQSFqYfnUCTSb4acEe7pp8dV_c",
    authDomain: "marcazshabab.firebaseapp.com",
    databaseURL: "https://marcazshabab-default-rtdb.firebaseio.com",
    projectId: "marcazshabab",
    storageBucket: "marcazshabab.firebasestorage.app",
    messagingSenderId: "403954625189",
    appId: "1:403954625189:web:b49405402e5fcdf1723b4c"
};

// تشغيل الفايربيز
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

document.addEventListener('DOMContentLoaded', () => {
  const myForm = document.getElementById('userDataForm');
  const letsGoBtn = document.getElementById("mm");

  myForm.addEventListener('submit', function(event) {
    event.preventDefault();

    const username = document.getElementById('username').value.trim();
    const address = document.getElementById('address').value.trim();
    const birthdate = document.getElementById('birthdate').value;
    const email = document.getElementById('email').value.trim();

    // التحقق من الاسم (حروف فقط)
    const nameRegex = /^[\p{L}\s]+$/u;
    if (!nameRegex.test(username)) {
      alert("⚠️ يرجى إدخال اسم شخص حقيقي (حروف فقط).");
      return;
    }

    // تجهيز كائن البيانات مع توقيت التسجيل الحقيقي
    const newUser = {
      username: username,
      address: address,
      birthdate: birthdate,
      email: email,
      loginTime: new Date().toLocaleString("ar-EG", { 
        dateStyle: "short", 
        timeStyle: "short" 
      })
    };

    // 🌟 حفظ البيانات في الفايربيز مباشرة تحت مسار 'allUsers' بشكل سحابي
    database.ref('allUsers').push(newUser)
      .then(() => {
          // حفظ محلي احتياطي للمستخدم الحالي لتسهيل قراءته في الصفحة التالية
          localStorage.setItem("currentUser", JSON.stringify(newUser));
          
          alert("تم تسجيل حسابك بنجاح في السيرفر! 🎉");
          
          myForm.reset();
          // تفعيل زر المتابعة
          letsGoBtn.disabled = false;
      })
      .catch((error) => {
          console.error("خطأ أثناء التسجيل: ", error);
          alert("حدث خطأ في الشبكة، يرجى المحاولة مرة أخرى.");
      });
  });

  // الانتقال للصفحة التالية عند الضغط
  letsGoBtn.addEventListener("click", () => {
    window.location.href = "kh22.html"; 
  });
});
</script>

</body>
</html>
