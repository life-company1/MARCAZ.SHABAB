<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>حالة المركز والألعاب</title>
    <style>
        /* تنسيقات عامة للجسم والخلفية */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* حاوية عناصر الحالة */
        .bbb {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            background: #1e1e24;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        /* تنسيق بطاقة الحالة العامة */
        .status-indicator {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            background: #2a2a32;
        }

        /* إضافة النقطة الملونة قبل النص */
        .status-indicator::before {
            content: '';
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 12px; /* مسافة بين النقطة والنص باللغة العربية */
            display: inline-block;
        }

        /* حالات المركز المفتوح والمغلق */
        .status-indicator.open, 
        .status-indicator.available {
            border: 1px solid #2ecc71;
            color: #2ecc71;
        }
        .status-indicator.open::before, 
        .status-indicator.available::before {
            background-color: #2ecc71;
            box-shadow: 0 0 10px #2ecc71;
        }

        .status-indicator.closed, 
        .status-indicator.unavailable {
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }
        .status-indicator.closed::before, 
        .status-indicator.unavailable::before {
            background-color: #e74c3c;
            box-shadow: 0 0 10px #e74c3c;
        }

        /* تنسيق شكل الـ Yin-Yang والأنيميشن */
        .wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }

        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(to right, #fff 50%, #000 50%);
            position: relative;
            animation: spin 4s linear infinite;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .circle::before, .circle::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            left: 25px;
        }

        .circle::before {
            top: 0;
            background: #fff;
            box-shadow: inset 0 0 0 15px #000;
        }

        .circle::after {
            bottom: 0;
            background: #000;
            box-shadow: inset 0 0 0 15px #fff;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="bbb">
    <div id="dashboardStatus" class="status-indicator">
        <span class="text">جاري فحص حالة المركز...</span>
    </div>

    <div id="playstationStatus" class="status-indicator">
        <span class="text">جاري فحص حالة البلايستيشن...</span>
    </div>
</div>

<div class="wrapper">
    <div class="circle"></div>
</div>

<script>
function updateDashboardStatus() {
  const statusDiv = document.getElementById("dashboardStatus");
  if(!statusDiv) return;
  const textSpan = statusDiv.querySelector(".text");
  const status = localStorage.getItem("centerStatus");

  if (status === "open") {
    statusDiv.classList.add("open");
    statusDiv.classList.remove("closed");
    textSpan.textContent = "المركز مفتوح الآن";
  } else {
    statusDiv.classList.add("closed");
    statusDiv.classList.remove("open");
    textSpan.textContent = "المركز مغلق الآن";
  }
}

function updatePlaystationStatus() {
  const statusDiv = document.getElementById("playstationStatus");
  if(!statusDiv) return;
  const textSpan = statusDiv.querySelector(".text");
  const status = localStorage.getItem("playstationStatus");

  if (status === "available") {
    statusDiv.classList.add("available");
    statusDiv.classList.remove("unavailable");
    textSpan.textContent = "البلايستيشن متاح الآن";
  } else {
    statusDiv.classList.add("unavailable");
    statusDiv.classList.remove("available");
    textSpan.textContent = "البلايستيشن مغلق الآن";
  }
}

// تشغيل الفانكشن عند تحميل الصفحة بالكامل
document.addEventListener("DOMContentLoaded", () => {
    updateDashboardStatus();
    updatePlaystationStatus();
});

// التحديث التلقائي إذا تغيرت القيم في الـ LocalStorage من صفحة أخرى
window.addEventListener("storage", function(e) {
  if (e.key === "centerStatus") {
    updateDashboardStatus();
  }
  if (e.key === "playstationStatus") {
    updatePlaystationStatus();
  }
});
</script>
    
</body>
</html>
