<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="kh1 .jpeg" sizes="32x32" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الجدول</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #0b574a;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: start;
            min-height: 100vh;
        }

        .table-container {
            width: 100%;
            max-width: 1200px;
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid #e2e8f0;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            text-align: center;
        }

        /* تنسيق الهيدر بألوان متناسقة هادئة */
        th {
            background-color: #0f172a;
            color: #ffffff;
            font-weight: 700;
            padding: 14px 16px;
            font-size: 14px;
            letter-spacing: 0.5px;
            border: 1px solid #334155;
        }

        th:first-child {
            border-top-right-radius: 8px;
        }
        th:last-child {
            border-top-left-radius: 8px;
        }

        /* تنسيق خطوط وخلايا الجدول */
        td {
            padding: 14px 16px;
            color: #334155;
            border-bottom: 1px solid #e2e8f0;
            border-left: 1px solid #f1f5f9;
            border-right: 1px solid #f1f5f9;
        }

        /* تلوين الصفوف الفردية والزوجية بشكل أنيق (Zebra Striping) */
        tr:nth-child(even) td {
            background-color: #f8fafc;
        }

        /* تأثير تمرير الماوس على الصفوف */
        tr:hover td {
            background-color: #f1f5f9;
            color: #0f172a;
            transition: background-color 0.2s ease;
        }

        .empty-msg {
            color: #94a3b8;
            padding: 40px !important;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th style="width: 70px;">م</th>
                <th>اسم النشاط</th>
                <th>المجال</th>
                <th>عدد المستفيدين</th>
                <th>المرحلة السنية</th>
                <th>التاريخ</th>
            </tr>
        </thead>
        <tbody id="viewTableBody">
            </tbody>
    </table>
</div>

<script>
    function loadTableData() {
        const activities = JSON.parse(localStorage.getItem('my_activities')) || [];
        const tbody = document.getElementById("viewTableBody");
        tbody.innerHTML = "";

        if (activities.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="empty-msg">لا توجد بيانات متاحة حالياً.. قم بإضافة أنشطة من لوحة التحكم</td></tr>`;
            return;
        }

        activities.forEach((item, index) => {
            const row = `
                <tr>
                    <td style="font-weight: 700; color: #64748b;">${index + 1}</td>
                    <td style="font-weight: 600;">${item.name}</td>
                    <td>${item.field}</td>
                    <td>${item.count}</td>
                    <td>${item.age}</td>
                    <td>${item.date}</td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    }

    // تحميل وعرض البيانات فور فتح الصفحة
    loadTableData();

    // تحديث فوري إذا تم التغيير من تابة الداشبورد المفتوحة بجانبها
    window.addEventListener('storage', loadTableData);
</script>
</body>
</html>
