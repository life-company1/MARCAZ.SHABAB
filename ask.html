<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="icon" type="image/png" href="kh1 .jpeg" sizes="32x32" /> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة عرض حتوزات الملعب</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background-color: #094d47; padding: 30px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; gap: 20px; }
        .container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 20px; }
        .price-card { align-self: flex-start; background: white; padding: 12px 18px; border-radius: 10px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; }
        .price-table { border-collapse: collapse; text-align: center; font-size: 14px; }
        .price-table th { background-color: #0f172a; color: white; padding: 6px 15px; font-weight: 700; border: 1px solid #334155; }
        .price-table td { padding: 8px 15px; font-weight: bold; border: 1px solid #e2e8f0; }
        .table-container { background: #ffffff; padding: 24px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; overflow-x: auto; }
        .main-table { width: 100%; border-collapse: collapse; font-size: 15px; text-align: center; }
        .main-table th { background-color: #0f172a; color: #ffffff; font-weight: 700; padding: 14px 16px; border: 1px solid #334155; }
        .main-table td { padding: 14px 16px; color: #334155; border-bottom: 1px solid #e2e8f0; border-left: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; }
        .main-table tr:nth-child(even) td { background-color: #f8fafc; }
        .main-table tr:hover td { background-color: #f1f5f9; }
        .empty-msg { color: #94a3b8; padding: 40px !important; font-weight: 600; }
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .badge-day { background-color: #fef3c7; color: #d97706; }
        .badge-night { background-color: #dbeafe; color: #1e40af; }
    </style>
</head>
<body>

<div class="container">
    <div class="price-card">
        <table class="price-table">
            <thead><tr><th>الفترة النهارية</th><th>الفترة المسائية</th></tr></thead>
            <tbody><tr><td style="color: #d97706;">50 جنيهاً / ساعة</td><td style="color: #1d4ed8;">75 جنيهاً / ساعة</td></tr></tbody>
        </table>
    </div>

    <div class="table-container">
        <table class="main-table">
            <thead>
                <tr>
                    <th style="width: 60px;">م</th><th>اسم المستأجر</th><th>رقم الهاتف</th><th>اليوم والتاريخ</th><th>الساعة (التوقيت)</th><th>الفترة</th><th>المبلغ المدفوع</th>
                </tr>
            </thead>
            <tbody id="viewTableBody"></tbody>
        </table>
    </div>
</div>

<script>
    const channel = new BroadcastChannel('stadium_channel');

    function displayData(bookings) {
        const tbody = document.getElementById("viewTableBody");
        tbody.innerHTML = "";

        if (!bookings || bookings.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7" class="empty-msg">لا توجد حجوزات مسجلة حالياً.</td></tr>`;
            return;
        }

        bookings.forEach((item, index) => {
            const periodBadge = item.period === 'نهار' 
                ? `<span class="badge badge-day">نهاراً</span>` 
                : `<span class="badge badge-night">ليلاً</span>`;

            tbody.innerHTML += `
                <tr>
                    <td style="font-weight: 700; color: #64748b;">${index + 1}</td>
                    <td style="font-weight: 600; color: #0f172a;">${item.name}</td>
                    <td>${item.phone}</td>
                    <td>${item.date}</td>
                    <td>${item.time}</td>
                    <td>${periodBadge}</td>
                    <td style="font-weight: 700; color: #16a34a;">${item.price} ج.م</td>
                </tr>
            `;
        });
    }

    channel.onmessage = function(event) {
        if (event.data && event.data.type === 'REFRESH_BOOKINGS') {
            displayData(event.data.payload);
        }
    };

    const localData = JSON.parse(localStorage.getItem('stadium_bookings')) || [];
    displayData(localData);
</script>
</body>
</html>
